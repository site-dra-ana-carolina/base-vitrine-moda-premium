kind = "web"
previewPath = "/"
title = "Atelier Store"
version = "1.0.0"
id = "artifacts/atelier-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25082

[services.development]
run = "pnpm --filter @workspace/atelier-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/atelier-store", "run", "build" ]
publicDir = "artifacts/atelier-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25082"
BASE_PATH = "/"
